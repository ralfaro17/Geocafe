{% extends "course/base.html" %}


{% block title %} Login {% endblock title %}

{% block head %}
    <h1>Login</h1>

    <h3>{{ error_message }}</h3>

    <form action="{% url 'course:login' %}" method="POST">
        {% csrf_token %}
        <div class="form-div">
            <label for="username-input">Nickname</label>
            <input id="username-input" type="text" placeholder="Enter your nickname" name="username" value="{{ previous_data.username }}" required>
        </div>
        <div class="form-div">
            <label for="password-input">Password</label>
            <input id="password-input" type="password" placeholder="Write your password" name="password" value="{{ previous_data.password }}" required>
        </div>
        <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="{% url 'course:register' %}">Sign up</a></p>

{% endblock head %}


{% block body %}

{% endblock body %}
