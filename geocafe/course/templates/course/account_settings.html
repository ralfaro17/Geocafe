{% extends "course/base.html" %}
{% load static %}
{% load django_vite %}

{% block title %} Settings {% endblock title %}
{% block head %}
    {% vite_asset 'course/js/account_settings.js' %}
    <link rel="stylesheet" href="{% static 'course/css/account_settings.css' %}">
{% endblock head %}

{% block body %}
    <h1>Settings</h1>
    <form action="{% url 'course:account_settings' %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div id="profile-picture-div">
            <img src="" alt="Profile Picture" id="profile-picture">
        </div>
        <div>
            <label for="username">Username</label>
            <input type="text" name="username" id="username" value="{{ user.username }}" disabled>
            <label for="first_name">First Name</label>
            <input type="text" name="first_name" id="first_name" value="{{ user.first_name }}">
            <label for="last_name">Last Name</label>
            <input type="text" name="last_name" id="last_name" value="{{ user.last_name }}">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" value="{{ user.email }}">
            <label for="password">New Password</label>
            <input type="password" name="password" id="password">
            <label for="password2">Confirm New Password</label>
            <input type="password" name="password2" id="password2">
            <label for="new-profile-picture">Profile picture</label>
            <input type="file" name="new_profile_picture" id="new-profile-picture">
            <button type="button" id="delete-profile-picture-button">Delete profile picture</button>
            <button type="submit">Save</button>
        </div>
    </form>
    
{% endblock body %}
