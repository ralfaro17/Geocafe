<!DOCTYPE html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %} {% endblock title %}</title>
    <link rel="stylesheet" href="{% static 'course/css/base.css' %}" />
    <script src="{% static 'course/js/base.js' %%}"></script>
    {% block head %} {% endblock head %}
  </head>
  <body class="theme">
    <nav class="theme navbar navbar-expand-lg navbar-light bg-color">
      <div class="container-fluid">
        <a class="navbar-brand lato-bold div-center " href="/"><img class="nav-img" src="{%static 'course/css/image/geocafe.png'%}" alt="GeoCafe"></a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="theme navbar-nav">
            <a class="theme nav-link" href="/">Theme</a>
            <a class="theme nav-link" href="#">Exercises</a>
            <a class="theme navbar-nav nav-link" href="#">Test</a>
            <a class="theme navbar-nav nav-link" href="#">Leaderboard</a>
            <div class="">
              {% if user.is_authenticated %}
              <a class="btn btn-basic active" href="{% url 'course:logout' %}"
                >Logout</a
              >
              {% else %}
              <a class="btn btn-basic active" href="{% url 'course:login' %}"
                >Login</a
              >
              <a
                class="btn btn-basic desactive"
                href="{% url 'course:register' %}"
                >Register</a
              >
              {% endif %}
            </div>
          </div>
        </div>
      </div>
    </nav>
    {% block body %} {% endblock body %}
  </body>
</html>
